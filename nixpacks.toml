[phases.setup]
nixPkgs = ["nodejs_20", "bun", "openssl", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["bun install --frozen-lockfile --ignore-scripts"]

[phases.build]
cmds = ["bun x prisma generate", "bun x next build --no-turbopack"]

[variables]
NEXT_TELEMETRY_DISABLED = "1"

[start]
cmd = "bun x prisma db push && node server.js"
